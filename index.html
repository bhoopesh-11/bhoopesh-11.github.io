            </div>
        </div>
    </div>

        { w: 12, q: "As per WPA 1972, wild life includes animal/vegetation which forms part of any", o: ["ecosystem", "state", "country", "habitat"], a: 3 },
        { w: 12, q: "Tiger regulates through trophic cascades and attracts tourists. It is", o: ["umbrella", "keystone", "flagship", "all of the above"], a: 3 },
        { w: 12, q: "\"the cost of impacts caused by emission of CO2\" is", o: ["cost of carbon", "economic cost", "social cost", "cultural cost"], a: 2 },
        { w: 12, q: "Soil formation is an example of", o: ["provisioning", "regulating", "supporting", "cultural"], a: 2 },
        { w: 12, q: "Orchids in Sessa Orchid Sanctuary attract witnesses. They are", o: ["umbrella", "keystone", "flagship", "extinct"], a: 2 },
        { w: 12, q: "Nutrient cycling is an example of", o: ["provisioning", "regulating", "supporting", "cultural"], a: 2 }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isAnswered = false;

    // Elements
    const quizContainer = document.getElementById('quiz-container');
    const resultsContainer = document.getElementById('results-container');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const progressIndicator = document.getElementById('progress-bar');
    const questionCount = document.getElementById('question-count');
    const weekTag = document.getElementById('week-tag');
    const nextBtn = document.getElementById('next-btn');
    const prevBtn = document.getElementById('prev-btn');
    const feedback = document.getElementById('feedback');
    const finalScore = document.getElementById('final-score');
    const finalPercent = document.getElementById('final-percent');

    function initQuiz() {
        showQuestion();
    }

    function showQuestion() {
        const data = quizData[currentQuestionIndex];
        
        // Update UI
        weekTag.textContent = `Week ${data.w}`;
        questionCount.textContent = `Question ${currentQuestionIndex + 1} of ${quizData.length}`;
        questionText.textContent = data.q;
        progressIndicator.style.width = `${((currentQuestionIndex + 1) / quizData.length) * 100}%`;
        
        // Reset state for new question or previous question
        optionsContainer.innerHTML = '';
        isAnswered = userAnswers[currentQuestionIndex] !== null;
        feedback.classList.add('hidden');
        
        // Update Nav buttons
        prevBtn.disabled = currentQuestionIndex === 0;
        nextBtn.textContent = currentQuestionIndex === quizData.length - 1 ? "Finish Quiz" : "Next Question";

        // Generate Options
        data.o.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = `w-full text-left p-4 rounded-xl border border-slate-200 font-medium option-transition hover:border-blue-300 hover:bg-blue-50 focus:outline-none flex justify-between items-center`;
            btn.innerHTML = `<span>${option}</span>`;
            
            // Re-apply states if previously answered
            if (isAnswered) {
                applyOptionStyles(btn, index, data.a, userAnswers[currentQuestionIndex]);
                btn.disabled = true;
            } else {
                btn.onclick = () => selectOption(index);
            }
            
            optionsContainer.appendChild(btn);
        });
    }

    function selectOption(index) {
        if (isAnswered) return;
        
        const data = quizData[currentQuestionIndex];
        userAnswers[currentQuestionIndex] = index;
        isAnswered = true;

        if (index === data.a) score++;

        // Style all options
        const btns = optionsContainer.querySelectorAll('button');
        btns.forEach((btn, i) => {
            applyOptionStyles(btn, i, data.a, index);
            btn.disabled = true;
        });

        // Show feedback
        feedback.classList.remove('hidden');
        if (index === data.a) {
            feedback.textContent = "Correct!";
            feedback.className = "text-green-600 font-bold";
        } else {
            feedback.textContent = `Incorrect. The correct answer was: ${data.o[data.a]}`;
            feedback.className = "text-red-500 font-bold";
        }
    }

    function applyOptionStyles(btn, i, correctIndex, userIndex) {
        if (i === correctIndex) {
            btn.classList.add('bg-green-50', 'border-green-500', 'text-green-700');
            btn.innerHTML += `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-500" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>`;
        } else if (i === userIndex) {
            btn.classList.add('bg-red-50', 'border-red-400', 'text-red-700');
            btn.innerHTML += `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>`;
        } else {
            btn.classList.add('opacity-50');
        }
    }

    nextBtn.onclick = () => {
        if (currentQuestionIndex < quizData.length - 1) {
            currentQuestionIndex++;
            showQuestion();
        } else {
            showResults();
        }
    };

    prevBtn.onclick = () => {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            showQuestion();
        }
    };

    function jumpToWeek(weekNum) {
        const index = quizData.findIndex(q => q.w === weekNum);
        if (index !== -1) {
            currentQuestionIndex = index;
            showQuestion();
            resultsContainer.classList.add('hidden');
            quizContainer.classList.remove('hidden');
        }
    }

    function showResults() {
        quizContainer.classList.add('hidden');
        resultsContainer.classList.remove('hidden');
        
        finalScore.textContent = `${score}/${quizData.length}`;
        const percent = Math.round((score / quizData.length) * 100);
        finalPercent.textContent = `${percent}%`;
    }

    initQuiz();
</script>

</body>
</html>
